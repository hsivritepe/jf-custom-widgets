<!DOCTYPE html>
<!--
  JotForm Custom Widget: Short text + Date.
  With one widget you get ONE submission column. We send both values as: "shortText | date".
  To get TWO columns: add two separate form fields to the form (e.g. "Single Line Text" and "Date"
  questions), set their question labels to exactly "Short Text" and "Date". The widget will fill them.
-->
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
	<style>
		html, body { margin: 0; min-height: 200px; }
		#widget-container {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			max-width: 560px;
			margin: 0 auto;
			padding: 16px;
		}
		#widget-container label {
			display: block;
			font-weight: 600;
			margin-bottom: 6px;
			color: #333;
		}
		#widget-container input[type="text"],
		#widget-container input[type="date"] {
			width: 100%;
			padding: 10px 12px;
			border: 1px solid #ccc;
			border-radius: 6px;
			font-size: 15px;
			box-sizing: border-box;
		}
		#widget-container .field-group { margin-bottom: 20px; }
	</style>
</head>
<body>
	<div id="widget-container">
		<div class="field-group">
			<label for="textInput" id="textLabel">Short Text</label>
			<input type="text" id="textInput" placeholder="">
		</div>
		<div class="field-group">
			<label for="dateInput" id="dateLabel">Date</label>
			<input type="date" id="dateInput">
		</div>
	</div>

	<script type="text/javascript">
		(function() {
			var textInput, dateInput;

			function initElements() {
				textInput = document.getElementById("textInput");
				dateInput = document.getElementById("dateInput");
			}

			function getSetting(key, defaultVal) {
				if (typeof JFCustomWidget.getWidgetSetting !== "function") return defaultVal;
				var v = JFCustomWidget.getWidgetSetting(key);
				if (v === undefined || v === null || String(v).trim() === "") return defaultVal;
				return String(v).trim();
			}

			function applyWidgetSettings() {
				var textLbl = document.getElementById("textLabel");
				var dateLbl = document.getElementById("dateLabel");
				if (textLbl) textLbl.textContent = getSetting("textLabel", "Short Text");
				if (dateLbl) dateLbl.textContent = getSetting("dateLabel", "Date");
				if (textInput) textInput.placeholder = getSetting("textPlaceholder", "") || "Enter text";
			}

			function updateFrameHeight() {
				function doResize() {
					var height = Math.max(200, Math.max(document.body.scrollHeight, document.documentElement.scrollHeight));
					var width = (document.getElementById("widget-container") && document.getElementById("widget-container").offsetWidth) || 560;
					if (typeof JFCustomWidget.setFrameSize === "function") JFCustomWidget.setFrameSize(width, height);
					if (typeof JFCustomWidget.requestFrameResize === "function") JFCustomWidget.requestFrameResize();
				}
				requestAnimationFrame(function() { doResize(); setTimeout(doResize, 100); });
			}

			JFCustomWidget.subscribe("ready", function() {
				initElements();
				applyWidgetSettings();
				updateFrameHeight();

				JFCustomWidget.subscribe("submit", function() {
					// Re-read from DOM at submit time (avoids stale refs)
					var textEl = document.getElementById("textInput");
					var dateEl = document.getElementById("dateInput");
					var textVal = (textEl && textEl.value) ? String(textEl.value).trim() : "";
					var dateVal = (dateEl && dateEl.value) ? String(dateEl.value) : "";

					var isValid = true;
					if (JFCustomWidget.isWidgetRequired && JFCustomWidget.isWidgetRequired()) {
						if (!textVal) isValid = false;
						if (!dateVal) isValid = false;
					}

					var valueToStore = (textVal || "") + " | " + (dateVal || "");
					if (!valueToStore.trim()) valueToStore = "";

					// 1) Send widget value first so it is stored in the widget column
					JFCustomWidget.sendSubmit({
						valid: isValid,
						value: valueToStore
					});

					// 2) Then try to fill separate fields if they exist (labels "Short Text" and "Date")
					var textFieldLabel = getSetting("textFieldLabel", "Short Text");
					var dateFieldLabel = getSetting("dateFieldLabel", "Date");
					if (typeof JFCustomWidget.setFieldsValueByLabel === "function") {
						setTimeout(function() {
							JFCustomWidget.setFieldsValueByLabel(textFieldLabel, textVal);
							JFCustomWidget.setFieldsValueByLabel(dateFieldLabel, dateVal);
						}, 0);
					}
				});

			});
		})();
	</script>
</body>
</html>
