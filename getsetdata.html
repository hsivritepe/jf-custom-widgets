<!doctype html>
<html>
	<head>
		<script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
		<meta http-equiv="cache-control" content="no-cache" />
		<meta http-equiv="expires" content="0" />
		<meta http-equiv="pragma" content="no-cache" />
	</head>
	<style></style>
	<body>
		<div id="reviewArea"></div>
		<script type="text/javascript">
			function tableExampleForCleaningDepot() {
				// get widget parameters if any using getWidgetSettings for all, or getWidgetSetting('name') for a specific one.
				// const params = JFCustomWidget.getWidgetSettings();

				// exposed functions
				this.init = init;
				this.getData = getData;
				const targetFieldName = "hiddenemail";
				let hiddenEmailValue = "";

				function getHiddenEmailFromForm() {
					console.log("Reading hiddenemail from parent form");
					JFCustomWidget.getFieldsValueByName(
						[targetFieldName],
						function (res) {
							const fieldData = res && res[targetFieldName];
							hiddenEmailValue = fieldData && fieldData.value ? fieldData.value : "";

							const reviewArea = document.getElementById("reviewArea");
							if (reviewArea) {
								reviewArea.textContent = hiddenEmailValue
									? `Hidden Email: ${hiddenEmailValue}`
									: "Hidden Email: (empty)";
							}

							console.log(`hiddenemail value: ${hiddenEmailValue}`);
						},
					);
				}

				// initialization of the widget
				function init(formData) {
					console.log("Hello world!");
					getHiddenEmailFromForm();
				}

				// get widget data
				function getData() {
					return {
						valid: true,
						value: hiddenEmailValue,
					};
				}
			}

			// always subscribe to ready event and implement widget related code
			// inside callback function , it is the best practice while developing widgets
			JFCustomWidget.subscribe("ready", function (data) {
				var widget = new tableExampleForCleaningDepot();
				widget.init(data);

				JFCustomWidget.subscribe("submit", function () {
					JFCustomWidget.sendSubmit(widget.getData());
				});
			});
		</script>
	</body>
</html>
