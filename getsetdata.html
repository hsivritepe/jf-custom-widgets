<!doctype html>
<html>
	<head>
		<script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
		<meta http-equiv="cache-control" content="no-cache" />
		<meta http-equiv="expires" content="0" />
		<meta http-equiv="pragma" content="no-cache" />
	</head>
	<style></style>
	<body>
		<div id="reviewArea"></div>
		<script type="text/javascript">
			function tableExampleForCleaningDepot() {
				// Widget parameters (set when you register the widget in JotForm):
				// - SourceFieldId: numeric id from the field's element id, e.g. input_4 → 4
				// - SourceFieldName: the field's unique name attribute, e.g. q4_typeA4 (NOT the label text)
				// The label "hiddenemail" is not the API name; inspect the field in the form HTML for name="q…".

				this.init = init;
				this.getData = getData;

				let hiddenEmailValue = "";

				function getSetting(key) {
					if (typeof JFCustomWidget.getWidgetSetting !== "function") return "";
					var v = JFCustomWidget.getWidgetSetting(key);
					return v == null ? "" : String(v).trim();
				}

				var sourceFieldId = getSetting("SourceFieldId");
				var sourceFieldName = getSetting("SourceFieldName");
				var legacyLabelAsName = getSetting("LegacyFieldName") || "hiddenemail";

				function normalizeFieldEntry(entry) {
					if (entry == null) return "";
					if (typeof entry === "string") return entry;
					if (typeof entry === "number" || typeof entry === "boolean") return String(entry);
					if (typeof entry === "object") {
						if ("value" in entry && entry.value != null) return String(entry.value);
						if ("text" in entry && entry.text != null) return String(entry.text);
					}
					return "";
				}

				function extractFieldValue(res, nameHint, idHint) {
					if (!res || typeof res !== "object") return "";
					var payload = res.data != null ? res.data : res;
					if (typeof payload !== "object" || payload == null) return "";

					if (nameHint && payload[nameHint] != null) {
						var a = normalizeFieldEntry(payload[nameHint]);
						if (a !== "") return a;
					}
					if (idHint) {
						var idStr = String(idHint);
						var tryKeys = ["input_" + idStr, idStr];
						for (var i = 0; i < tryKeys.length; i++) {
							if (payload[tryKeys[i]] != null) {
								var b = normalizeFieldEntry(payload[tryKeys[i]]);
								if (b !== "") return b;
							}
						}
					}
					for (var k in payload) {
						if (!Object.prototype.hasOwnProperty.call(payload, k)) continue;
						var c = normalizeFieldEntry(payload[k]);
						if (c !== "") return c;
					}
					return "";
				}

				function updateReviewArea() {
					var reviewArea = document.getElementById("reviewArea");
					if (!reviewArea) return;
					reviewArea.textContent = hiddenEmailValue
						? "Hidden Email: " + hiddenEmailValue
						: "Hidden Email: (empty)";
				}

				function applyResponse(res) {
					var nameHint = sourceFieldName || legacyLabelAsName;
					var extracted = extractFieldValue(res, nameHint, sourceFieldId);
					hiddenEmailValue = extracted;
					updateReviewArea();
					console.log("getsetdata field response:", res, "→", hiddenEmailValue);
				}

				function fetchFieldValue() {
					if (sourceFieldId) {
						var idArr = [String(sourceFieldId)];
						if (typeof JFCustomWidget.getFieldsValueById === "function") {
							JFCustomWidget.getFieldsValueById(idArr, applyResponse);
							return;
						}
					}
					var nameArr = [];
					if (sourceFieldName) nameArr.push(sourceFieldName);
					else nameArr.push(legacyLabelAsName);
					JFCustomWidget.getFieldsValueByName(nameArr, applyResponse);
				}

				function attachLiveListener() {
					if (!sourceFieldId || typeof JFCustomWidget.listenFromField !== "function") return;
					var inputRef = "input_" + String(sourceFieldId);
					function onVal(value) {
						hiddenEmailValue = value != null ? String(value) : "";
						updateReviewArea();
					}
					try {
						JFCustomWidget.listenFromField(inputRef, "change", onVal);
						JFCustomWidget.listenFromField(inputRef, "keyup", onVal);
					} catch (e) {
						console.warn("listenFromField failed:", e);
					}
				}

				function getHiddenEmailFromForm() {
					console.log("Reading source field — id:", sourceFieldId || "(none)", "name:", sourceFieldName || legacyLabelAsName);
					fetchFieldValue();
					setTimeout(fetchFieldValue, 300);
				}

				function init(formData) {
					console.log("Hello world!");
					getHiddenEmailFromForm();
					attachLiveListener();
				}

				function getData() {
					return {
						valid: true,
						value: hiddenEmailValue,
					};
				}
			}

			JFCustomWidget.subscribe("ready", function (data) {
				var widget = new tableExampleForCleaningDepot();
				widget.init(data);

				JFCustomWidget.subscribe("submit", function () {
					JFCustomWidget.sendSubmit(widget.getData());
				});
			});
		</script>
	</body>
</html>
