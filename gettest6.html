<!doctype html>
<html>
	<head>
		<script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
		<meta http-equiv="cache-control" content="no-cache" />
		<meta http-equiv="expires" content="0" />
		<meta http-equiv="pragma" content="no-cache" />
	</head>
	<style></style>
	<body>
		<div id="reviewArea"></div>
		<script type="text/javascript">
			function tableExampleForCleaningDepot() {
				// get widget parameters if any using getWidgetSettings for all, or getWidgetSetting('name') for a specific one.
				// const params = JFCustomWidget.getWidgetSettings();

				// exposed functions
				this.init = init;
				this.getData = getData;
				const otherFields = ["q9_email"];

				function getFieldsByX() {
					console.log("Running getFieldsByX");
					JFCustomWidget.getFieldsValueByName(
						otherFields,
						function (res) {
							console.log(
								`Here's the data ${JSON.stringify(res, null, 2)}`,
							);
							var items = (res && res.data) || [];
							var email = "";
							for (var i = 0; i < items.length; i++) {
								if (items[i].selector === "q9_email") {
									email = items[i].value || "";
									break;
								}
							}
							var el = document.getElementById("iframeEmail");
							if (el) el.value = email;
						},
					);
				}

				// initialization of the widget
				function init(formData) {
					console.log("Hello world!2");
					getFieldsByX();
				}

				// get widget data
				function getData() {
					return {
						valid: true,
						value: "TEST",
					};
				}
			}

			// always subscribe to ready event and implement widget related code
			// inside callback function , it is the best practice while developing widgets
			JFCustomWidget.subscribe("ready", function (data) {
				var widget = new tableExampleForCleaningDepot();
				widget.init(data);

				JFCustomWidget.subscribe("submit", function () {
					JFCustomWidget.sendSubmit(widget.getData());
				});
			});
		</script>
		<input
			type="text"
			id="iframeEmail"
			placeholder="Enter email"
			value=""
		/>
	</body>
</html>
